name: Release

# Builds self-contained Windows + macOS binaries and attaches them to a GitHub Release.
# Trigger by pushing a tag like `v0.9.0`. Can also be run manually (artifacts only, no release upload).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            name: windows-x64
          - os: macos-latest
            rid: osx-arm64
            name: macos-arm64
          - os: macos-latest
            rid: osx-x64
            name: macos-x64
          - os: ubuntu-latest
            rid: linux-x64
            name: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained)
        run: >
          dotnet publish OsuBeatmapEditor.Desktop/OsuBeatmapEditor.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=true
          -o publish/${{ matrix.name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.name }}/* -DestinationPath sobe-${{ matrix.name }}.zip

      - name: Package (macOS .app)
        if: runner.os == 'macOS'
        run: |
          APP="sobe.app"
          mkdir -p "$APP/Contents/MacOS"
          cp -R publish/${{ matrix.name }}/* "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/OsuBeatmapEditor"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>sobe</string>
            <key>CFBundleDisplayName</key><string>sobe</string>
            <key>CFBundleIdentifier</key><string>com.sorangan.sobe</string>
            <key>CFBundleExecutable</key><string>OsuBeatmapEditor</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>0.9.5</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict>
          </plist>
          PLIST
          # Ad-hoc signature: free (no Apple Developer cert), and stops Apple Silicon from refusing the
          # bundle as "damaged". It does NOT remove the Gatekeeper prompt — users still clear quarantine
          # (see README). Real signing/notarisation needs a paid Developer ID and would slot in here.
          codesign --force --deep --sign - "$APP"
          zip -ry sobe-${{ matrix.name }}.zip "$APP"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x publish/${{ matrix.name }}/OsuBeatmapEditor
          cd publish/${{ matrix.name }}
          zip -ry ../../sobe-${{ matrix.name }}.zip .

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sobe-${{ matrix.name }}.zip
          generate_release_notes: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sobe-${{ matrix.name }}
          path: sobe-${{ matrix.name }}.zip
